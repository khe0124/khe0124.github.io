# Site settings
title:          seaweed island
description:    "Front-end Developer"
baseurl:        ""
url:            "https://khe0124.github.io"

# Google Analytics
google_analytics: UA—XXXXXXXX-X

# Author
author:
  name:         Haeun Kang
